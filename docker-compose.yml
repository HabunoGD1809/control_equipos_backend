services:
  # Servicio Base de Datos (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: control_equipos_db
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - control_equipos_net

  # Servicio Redis (Broker/Backend para Celery)
  redis:
    image: redis:7-alpine
    container_name: control_equipos_redis
    ports:
      - "6379:6379"
    networks:
      - control_equipos_net

  # Servicio Backend (API - Uvicorn)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control_equipos_backend
    # uv run garantiza que se ejecute dentro del virtualenv correcto
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8086:8000"
    env_file: .env
    # user: root solo para desarrollo local con volúmenes montados.
    # En producción quita esta línea y dejar el usuario "app" del Dockerfile.
    user: root
    volumes:
      - ./app:/home/app/app
      - ./alembic:/home/app/alembic
      - ./alembic.ini:/home/app/alembic.ini
      - ./uploads:/home/app/uploads
      - ./logs:/home/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - control_equipos_net

  # Servicio Worker (Celery)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control_equipos_worker
    command: uv run celery -A app.worker worker --loglevel=info
    env_file: .env
    user: root
    volumes:
      - ./app:/home/app/app
      - ./uploads:/home/app/uploads
      - ./logs:/home/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - control_equipos_net

  # Servicio Programador (Celery Beat)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control_equipos_beat
    command: uv run celery -A app.worker beat -s /tmp/celerybeat-schedule --pidfile=/tmp/celerybeat.pid --loglevel=info
    env_file: .env
    user: root
    volumes:
      - ./app:/home/app/app
      - ./uploads:/home/app/uploads
      - ./logs:/home/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - control_equipos_net

networks:
  control_equipos_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
